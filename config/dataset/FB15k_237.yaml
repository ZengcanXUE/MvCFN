# @package _global_

dataset: FB15k_237

epoch: 600
batch_size: 1024
learning_rate: 3.5e-4
h_dim: 450  # origin value:450, mdcn:400
pred_rel_w: False
label_smooth: 0.1

# graph
kg_layer: 2
rm_rate: 0.5  # randomly removing training edges
ent_drop: 0.3
rel_drop: 0.1
comp_op: mul   # add/mul
bn: False  # batchnorn

# ConvE
k_h: 15 # origin value:15, mdcn:20
k_w: 30 # origin value:30, mdcn:20
conv_drop: 0.3
ent_drop_pred: 0.3
fc_drop: 0.5
ker_sz: 8 # origin value:8
out_channel: 200